<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CUBES 2048 - Aggressive Bot Edition</title>
    <style>
        :root { --bg: #f0f2f5; --pink: #ff4d91; --blue: #00d2ff; --gold: #ffcc00; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; }
        
        #start-screen, #game-over {
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center;
            z-index: 100; background: rgba(0,0,0,0.15); backdrop-filter: blur(12px); pointer-events: auto;
        }
        #game-over { display: none; }
        .panel { background: white; padding: 25px; border-radius: 30px; text-align: center; width: 340px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        
        .skin-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .skin-item { width: 60px; height: 60px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .skin-item.active { border-color: #333; transform: scale(1.1); }

        #minimap {
            position: absolute; bottom: 20px; right: 20px; width: 150px; height: 150px;
            background: rgba(255,255,255,0.6); border: 3px solid white; border-radius: 15px;
            backdrop-filter: blur(5px); overflow: hidden;
        }
        #leaderboard {
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.8);
            padding: 15px; border-radius: 15px; min-width: 180px;
        }
        .leader-item { display: flex; justify-content: space-between; margin: 5px 0; font-size: 14px; font-weight: 800; }
        .is-king { color: #d4af37; }
        .me { color: var(--blue); }

        #boost-ui {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 220px; height: 12px; background: rgba(0,0,0,0.1); border-radius: 10px; border: 2px solid white;
        }
        #boost-fill { width: 100%; height: 100%; background: var(--blue); border-radius: 8px; }

        .btn { background: var(--pink); color: white; border: none; padding: 15px 35px; border-radius: 30px; cursor: pointer; font-weight: 900; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="start-screen">
    <div class="panel">
        <h2 style="color: var(--pink); margin-top: 0;">CUBE 2048 - HUNTER</h2>
        <input type="text" id="name-input" placeholder="Tên của bạn..." style="padding:12px; border-radius:12px; border:1px solid #ddd; width:85%;">
        <div class="skin-list" id="skin-picker"></div>
        <button class="btn" onclick="startGame()">VÀO SINH TỬ</button>
    </div>
</div>

<div id="game-over">
    <div class="panel">
        <h1 style="color: #ff4d4d;">BỊ NUỐT CHỬNG!</h1>
        <p id="final-score" style="font-size: 20px; font-weight: 800;">Điểm: 2</p>
        <button class="btn" onclick="resetGame()">PHỤC THÙ</button>
    </div>
</div>

<div id="ui-layer">
    <div id="leaderboard"><div id="leader-list"></div></div>
    <div id="minimap"></div>
    <div id="boost-ui"><div id="boost-fill"></div></div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const worldSize = 5000;
const maxEnemies = 30; 
let w, h, player, gameActive = false;
let enemies = [], foods = [];

const skins = [
    { color: '#ffafcc' }, { color: '#a2d2ff' }, { color: '#cdb4db' }, { color: '#b9fbc0' },
    { color: '#ffcc00', glow: true }, { color: '#333333' }, { color: '#6a0572' }, { color: '#ff4d4d' }
];
let selectedSkin = skins[0];

function init() {
    resize();
    renderSkins();
    for(let i=0; i<500; i++) spawnFood();
    for(let i=0; i<maxEnemies; i++) spawnEnemy();
    loop();
}

function renderSkins() {
    const container = document.getElementById('skin-picker');
    skins.forEach((skin, i) => {
        const div = document.createElement('div');
        div.className = 'skin-item' + (i===0?' active':'');
        div.style.background = skin.color;
        div.onclick = () => {
            document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            selectedSkin = skin;
        };
        container.appendChild(div);
    });
}

function spawnFood() {
    foods.push({
        x: Math.random()*worldSize, y: Math.random()*worldSize,
        val: Math.pow(2, 1 + Math.floor(Math.random()*4)),
        color: `hsl(${Math.random()*360}, 70%, 65%)`
    });
}

function spawnEnemy() {
    const names = ["PREDATOR", "Slayer", "TERMINATOR", "HUNTER", "Shadow", "King", "Ghost", "Luffy", "Zoro", "Madara", "Sukuna", "Goku", "Kaido", "Aizen"];
    enemies.push({
        id: Math.random(), 
        name: names[Math.floor(Math.random()*names.length)] + "_" + (Math.floor(Math.random()*99)),
        x: Math.random()*worldSize, y: Math.random()*worldSize,
        val: Math.pow(2, 1 + Math.floor(Math.random()*4)),
        color: skins[Math.floor(Math.random()*skins.length)].color,
        angle: Math.random()*Math.PI*2,
        size: 50
    });
}

function startGame() {
    const name = document.getElementById('name-input').value || "Vy Vy";
    player = {
        id: 'me', name: name, x: worldSize/2, y: worldSize/2,
        val: 2, skin: selectedSkin, size: 50,
        boost: 1, energy: 100, isBoosting: false
    };
    gameActive = true;
    document.getElementById('start-screen').style.display = 'none';
}

function resetGame() {
    document.getElementById('game-over').style.display = 'none';
    startGame();
}

function update() {
    if(!gameActive) return;

    // Player Movement
    if(player.isBoosting && player.energy > 0) {
        player.boost = 2.2; player.energy -= 1.2;
    } else {
        player.boost = 1; if(player.energy < 100) player.energy += 0.4;
    }

    let pSpeed = 2.4 * (1 / (1 + Math.log10(player.val/2)*0.25)) * player.boost;
    const pAngle = Math.atan2(mouse.y - h/2, mouse.x - w/2);
    player.x += Math.cos(pAngle) * pSpeed;
    player.y += Math.sin(pAngle) * pSpeed;
    player.size = 45 + Math.log2(player.val)*6;
    player.x = Math.max(0, Math.min(worldSize, player.x));
    player.y = Math.max(0, Math.min(worldSize, player.y));

    // Bot AI: CHẾ ĐỘ HUNG DỮ CAO ĐỘ
    for (let idx = enemies.length - 1; idx >= 0; idx--) {
        let bot = enemies[idx];
        let targets = [...enemies, player].filter(u => u.id !== bot.id);
        
        let closestPrey = null, dPrey = 1500; // Tăng tầm nhìn lên cực xa
        let closestThreat = null, dThreat = 450;

        targets.forEach(t => {
            let d = Math.hypot(bot.x - t.x, bot.y - t.y);
            // Ưu tiên săn những mục tiêu có giá trị cao (val lớn nhưng vẫn nhỏ hơn bot)
            if(t.val < bot.val && d < dPrey) { dPrey = d; closestPrey = t; }
            if(t.val > bot.val && d < dThreat) { dThreat = d; closestThreat = t; }
        });

        if(closestThreat) { 
            bot.angle = Math.atan2(bot.y - closestThreat.y, bot.x - closestThreat.x);
        } else if(closestPrey) { 
            // Truy đuổi mục tiêu quyết liệt
            bot.angle = Math.atan2(closestPrey.y - bot.y, closestPrey.x - bot.x);
        } else { 
            // Nếu không có mồi, tìm thức ăn gần nhất
            let nearestFood = null, dF = 1200;
            foods.forEach(f => {
                let d = Math.hypot(bot.x - f.x, bot.y - f.y);
                if(d < dF && bot.val >= f.val) { dF = d; nearestFood = f; }
            });
            if(nearestFood) bot.angle = Math.atan2(nearestFood.y - bot.y, nearestFood.x - bot.x);
        }

        // Tốc độ bot hung dữ (2.0 thay vì 1.8)
        bot.x += Math.cos(bot.angle) * 2.0;
        bot.y += Math.sin(bot.angle) * 2.0;
        bot.size = 45 + Math.log2(bot.val)*6;
        bot.x = Math.max(0, Math.min(worldSize, bot.x));
        bot.y = Math.max(0, Math.min(worldSize, bot.y));

        // Bot ăn Player
        let distToPlayer = Math.hypot(player.x - bot.x, player.y - bot.y);
        if(distToPlayer < (player.size + bot.size)/2.2) {
            if(player.val > bot.val) { 
                player.val += bot.val; enemies.splice(idx, 1); spawnEnemy(); 
            } else if(bot.val > player.val) { 
                gameOver(); 
            }
        }
        
        // Bot ăn Bot (Hung tàn)
        for (let j = enemies.length - 1; j >= 0; j--) {
            if (idx === j) continue;
            let otherBot = enemies[j];
            let distBetweenBots = Math.hypot(bot.x - otherBot.x, bot.y - otherBot.y);
            if (distBetweenBots < (bot.size + otherBot.size) / 2.2) {
                if (bot.val > otherBot.val) {
                    bot.val += otherBot.val;
                    enemies.splice(j, 1);
                    spawnEnemy();
                    if (j < idx) idx--;
                }
            }
        }

        // Bot ăn thức ăn
        foods.forEach((f, fi) => {
            if(Math.hypot(bot.x-f.x, bot.y-f.y) < bot.size/1.5 && bot.val >= f.val) {
                bot.val += f.val; foods.splice(fi, 1); spawnFood();
            }
        });
    }

    // Player ăn thức ăn
    for(let i=foods.length-1; i>=0; i--) {
        let f = foods[i];
        if(Math.hypot(player.x-f.x, player.y-f.y) < player.size/1.5 && player.val >= f.val) {
            player.val += f.val; foods.splice(i, 1); spawnFood();
        }
    }

    updateHUD();
}

function gameOver() {
    gameActive = false;
    document.getElementById('final-score').innerText = "Điểm: " + Math.floor(player.val);
    document.getElementById('game-over').style.display = 'flex';
}

function updateHUD() {
    const all = [...enemies, player].sort((a,b) => b.val - a.val);
    const king = all[0];
    document.getElementById('leader-list').innerHTML = all.slice(0, 5).map((u, i) => `
        <div class="leader-item ${u.id === king.id ? 'is-king' : ''} ${u.id === 'me' ? 'me' : ''}">
            <span>${u.id === king.id ? '👑' : i+1}. ${u.name}</span>
            <span>${Math.floor(u.val)}</span>
        </div>`).join('');
    document.getElementById('boost-fill').style.width = player.energy + "%";

    let mHtml = "";
    all.forEach(u => {
        let x = (u.x/worldSize)*150, y = (u.y/worldSize)*150;
        let color = u.id === 'me' ? '#00d2ff' : (u.id === king.id ? '#ffcc00' : '#ff4d4d');
        mHtml += `<div style="position:absolute; left:${x-2}px; top:${y-2}px; width:4px; height:4px; background:${color}; border-radius:50%"></div>`;
    });
    document.getElementById('minimap').innerHTML = mHtml;
}

function draw() {
    ctx.clearRect(0, 0, w, h);
    if(!gameActive) return;
    const cx = player.x - w/2, cy = player.y - h/2;
    const kingId = [...enemies, player].sort((a,b) => b.val - a.val)[0].id;

    foods.forEach(f => {
        let canEat = player.val >= f.val;
        let s = canEat ? 50 : 25;
        let rx = f.x - cx, ry = f.y - cy;
        if(rx < -50 || rx > w+50 || ry < -50 || ry > h+50) return;
        ctx.save();
        ctx.globalAlpha = canEat ? 1 : 0.3;
        ctx.fillStyle = f.color;
        if(canEat) { ctx.shadowBlur = 15; ctx.shadowColor = f.color; }
        ctx.beginPath(); ctx.roundRect(rx-s/2, ry-s/2, s, s, 10); ctx.fill();
        ctx.fillStyle = "white";
        ctx.font = `900 ${canEat?22:12}px 'Segoe UI', Arial`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(f.val, rx, ry);
        ctx.restore();
    });

    [...enemies, player].forEach(u => {
        let rx = u.x - cx, ry = u.y - cy;
        if(rx < -150 || rx > w+150 || ry < -150 || ry > h+150) return;
        ctx.save();
        ctx.translate(rx, ry);
        ctx.fillStyle = u.id === 'me' ? u.skin.color : u.color;
        if(u.id === 'me' && u.skin.glow) { ctx.shadowBlur = 20; ctx.shadowColor = u.skin.color; }
        ctx.beginPath(); ctx.roundRect(-u.size/2, -u.size/2, u.size, u.size, u.size/4); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
        if(u.id === kingId) { ctx.font = "40px Arial"; ctx.textAlign="center"; ctx.fillText("👑", 0, -u.size/1.5); }
        ctx.fillStyle = "white";
        ctx.font = `900 ${u.size/2.5}px 'Segoe UI', Arial`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(Math.floor(u.val), 0, 0);
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.font = "bold 14px Arial"; ctx.fillText(u.name, 0, u.size/2 + 20);
        ctx.restore();
    });
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }

const mouse = {x: 0, y: 0};
window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onmousedown = () => { if(player) player.isBoosting = true; };
window.onmouseup = () => { if(player) player.isBoosting = false; };
window.onkeydown = (e) => { if(e.code === 'Space') player.isBoosting = true; };
window.onkeyup = (e) => { if(e.code === 'Space') player.isBoosting = false; };
window.onresize = resize;

init();
</script>
</body>
</html>
